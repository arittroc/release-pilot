# --- SERVICES SERVICE ---
---
apiVersion: v1
kind: Service
metadata:
  name: services-service
spec:
  ports:
  - port: 4001
  selector:
    app: services-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: services-service
spec:
  selector:
    matchLabels:
      app: services-service
  template:
    metadata:
      labels:
        app: services-service
    spec:
      containers:
      - name: services-service
        image: arittroc/releasepilot-services-service:latest
        imagePullPolicy: Always
        env:
        - name: PORT
          value: "4001"
        - name: DATABASE_URL
          value: "postgresql://postgres:skyie%40123@postgres:5432/releasepilot"

