name: Deploy Frontend

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # Or 'self-hosted' if you set up a local runner!
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Nginx Container
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: arittroc/releasepilot-frontend:latest

      - name: Trigger Kubernetes Rolling Update
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Tell Kubernetes to pull the new image and restart the UI
            kubectl rollout restart deployment frontend
