name: ReleasePilot CI/CD

on:
  push:
    branches: [ "main" ]
    # Only trigger the pipeline if backend code or the pipeline itself changes
    paths:
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PAT }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build and Push Images
      run: |
        export DOCKER_USER="${{ secrets.DOCKER_USERNAME }}"
        # ADDED noti-service TO THIS LIST:
        for service in auth-service services-service releases-service incidents-service gateway noti-service; do
          docker build -t $DOCKER_USER/releasepilot-$service:latest ./backend/$service
          docker push $DOCKER_USER/releasepilot-$service:latest
        done

    - name: Deploy to K3s Cluster
      run: |
        kubectl rollout restart deployment/auth-service
        kubectl rollout restart deployment/services-service
        kubectl rollout restart deployment/releases-service
        kubectl rollout restart deployment/incidents-service
        kubectl rollout restart deployment/gateway
        # ADDED THE RESTART COMMAND FOR NOTI-SERVICE:
        kubectl rollout restart deployment/noti-service
