name: Deploy Incidents Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/incidents-service/**'
      - '.github/workflows/deploy-services.yml'

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          cd backend/incidents-service
          docker build -t arittroc/releasepilot-incidents-service:latest .
          docker push arittroc/releasepilot-incidents-service:latest

      - name: Deploy to K3s Cluster
        run: |
          # Force Kubernetes to pull the new image and restart the pods
          kubectl rollout restart deployment incidents-service
