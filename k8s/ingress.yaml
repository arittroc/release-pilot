apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: releasepilot-ingress
  annotations:
    kubernetes.io/ingress.class: traefik
    # This tells the Ingress to strip the /api prefix before sending it to the Gateway if needed
    # but since our Gateway listens on /api anyway, we just define clean routing!
spec:
  rules:
  - host: releasepilot.local
    http:
      paths:
      # 1. Route all backend traffic to the Gateway
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 4000
      # 2. Route everything else to the React Frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
