apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: releasepilot-ingress
  namespace: default
  annotations:
    # Traefik strips the path prefix before forwarding — not needed here
    # since all three hosts route to the service root, but good to be explicit.
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: releasepilot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

    - host: api.releasepilot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 4000

    - host: grafana.releasepilot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana-service
                port:
                  number: 3000
