apiVersion: apps/v1
kind: Deployment
metadata:
  name: services-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: services-service
  template:
    metadata:
      labels:
        app: services-service
    spec:
      containers:
      - name: services-service
        image: arittroc/releasepilot-services-service:latest
        imagePullPolicy: Always
        env:
        - name: DB_HOST
          value: "postgres"
        - name: DB_USER
          value: "postgres"
        - name: DB_NAME
          value: "releasepilot"
        - name: DB_PORT
          value: "5432"
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        ports:
        - containerPort: 4001
        livenessProbe:
          httpGet:
            path: /api/services/health
            port: 4001
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/services/health
            port: 4001
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: services-service
spec:
  selector:
    app: services-service
  ports:
    - protocol: TCP
      port: 4001
      targetPort: 4001