apiVersion: apps/v1
kind: Deployment
metadata:
  name: noti-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: noti-service
  template:
    metadata:
      labels:
        app: noti-service
    spec:
      containers:
      - name: noti-service
        image: arittroc/noti-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 4005
---
apiVersion: v1
kind: Service
metadata:
  name: noti-service
spec:
  selector:
    app: noti-service
  ports:
    - protocol: TCP
      port: 4005
      targetPort: 4005
